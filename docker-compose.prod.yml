services:
  postgres:
    image: postgres:16-alpine
    container_name: reservation-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-reservation_db}
      POSTGRES_USER: ${DB_USER:-reservation_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-reservation_user} -d ${DB_NAME:-reservation_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reservation-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: reservation-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reservation-net
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: src/ReservationSystem.API/Dockerfile
    container_name: reservation-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${DB_NAME:-reservation_db};Username=${DB_USER:-reservation_user};Password=${DB_PASSWORD}
      - Redis__ConnectionString=redis:6379
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=reservation-api
      - Jwt__Audience=reservation-clients
      - AllowedOrigins__0=http://${SERVER_HOST}
      - AllowedOrigins__1=https://${SERVER_HOST}
      - Iyzico__ApiKey=${IYZICO_API_KEY}
      - Iyzico__SecretKey=${IYZICO_SECRET_KEY}
      - Iyzico__BaseUrl=${IYZICO_BASE_URL:-https://sandbox-api.iyzipay.com}
      - Iyzico__CallbackUrl=http://${SERVER_HOST}/api/v1/payments/callback
      - Iyzico__FrontendBaseUrl=http://${SERVER_HOST}
    volumes:
      - uploads_data:/app/wwwroot/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - reservation-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_DEV_TENANT_SLUG: ${TENANT_SLUG:-math-masters}
    container_name: reservation-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - reservation-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  reservation-net:
    driver: bridge
