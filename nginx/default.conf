# Catches any *.localhost subdomain and proxies to the frontend dev server.
# The subdomain becomes available to the app via the Host header,
# which the frontend reads as window.location.hostname.

server {
    listen 80;
    server_name ~^(?<tenant>.+)\.localhost$;

    # Frontend (Vite dev server)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Vite HMR websocket
    location /_vite {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API proxy — avoids CORS issues in dev
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-Slug $tenant;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
